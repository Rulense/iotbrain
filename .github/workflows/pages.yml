# Deploys the website (index.html + updates.json) to GitHub Pages.
#
# NOTE: this workflow activates once the repo exists on GitHub and the
# repository's Pages source is set to "GitHub Actions"
# (Settings → Pages → Build and deployment → Source: GitHub Actions).
name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # REQUIRED: gen_updates.py dates rows from `git log --diff-filter=A`,
          # which needs full history — a shallow clone yields wrong dates.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install -r requirements-dev.txt
      # Refresh stats + Latest Additions in the workspace before staging.
      - run: python3 scripts/gen_updates.py
      - run: mkdir _site && cp index.html updates.json _site/ && cp -R assets _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
